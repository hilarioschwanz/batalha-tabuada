<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha da Tabuada - Prof. Hilário</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #0f3460; --accent: #e94560; --gold: #f1c40f; --success: #27ae60; 
            --dark: #1a1a2e; --card-bg: #ffffff; --text: #1a1a2e; --bg: #1a1a2e; --footer-text: #ffffff;
        }
        body.light-mode { --bg: #f0f2f5; --card-bg: #ffffff; --text: #1a1a2e; --footer-text: #1a1a2e; }
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }

        .theme-toggle { position: fixed; top: 15px; right: 15px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; z-index: 1000; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* BANNERS */
        .banner-wrapper { width: 100%; max-width: 800px; margin-bottom: 20px; background: #16213e; border-radius: 20px; border: 2px solid #444; overflow: hidden; position: relative; height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .slide { position: absolute; inset: 0; display: flex; align-items: center; padding: 10px 15px; opacity: 0; transition: opacity 0.8s; }
        .slide.active { opacity: 1; z-index: 5; }
        .slide img { height: 70px; width: 70px; object-fit: cover; border-radius: 12px; margin-right: 15px; border: 2px solid var(--gold); }
        .slide-title { color: var(--gold); font-weight: 800; margin: 0; font-size: 1rem; }

        /* JOGO */
        .card { background: var(--card-bg); color: var(--text); padding: 25px; border-radius: 30px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; width: 100%; max-width: 500px; }
        .avatar-grid { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .avatar-option { font-size: 2rem; cursor: pointer; padding: 10px; border-radius: 15px; border: 2px solid #eee; background: #f9f9f9; }
        .avatar-option.selected { border-color: var(--accent); background: #fff0f1; transform: scale(1.1); }
        
        .question { font-size: clamp(3rem, 10vh, 5rem); font-weight: 900; color: var(--primary); margin: 15px 0; }
        #ans { width: 100%; max-width: 180px; font-size: 2.5rem; text-align: center; border-radius: 15px; border: 3px solid #eee; padding: 10px; outline: none; background: #fdfdfd; color: var(--dark); }
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        
        .lvl-btn { padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 8px; cursor: pointer; color: #333; font-weight: 700; background: white; display: flex; justify-content: space-between; }
        
        #ranking-box, #cert-box { display: none; position: absolute; inset: 0; background: white; z-index: 100; border-radius: 30px; padding: 20px; overflow-y: auto; color: #333; }
        .rank-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.9rem; }

        .section-container { width: 100%; max-width: 800px; margin-top: 40px; text-align: center; }
        .testi-card { background: #16213e; padding: 20px; border-radius: 20px; border-left: 5px solid var(--gold); text-align: left; margin-bottom: 15px; }
        body.light-mode .testi-card { background: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 20px; z-index: 2000; width: 95%; max-width: 450px; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }

        footer { margin-top: 40px; text-align: center; font-size: 0.8rem; opacity: 0.7; color: var(--footer-text); padding-bottom: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <div class="banner-wrapper" id="banner-area"></div>

    <div id="setup-screen" class="card">
        <div id="ranking-box">
            <h2 style="color:var(--primary)">🏆 RANKING</h2>
            <div id="ranking-list"></div>
            <button class="btn-main" onclick="document.getElementById('ranking-box').style.display='none'" style="background:#888">VOLTAR</button>
        </div>

        <strong style="color:var(--accent)">👨‍🏫 Professor Hilário</strong>
        <h2 style="margin: 5px 0;">⚔️ BATALHA DA TABUADA</h2>
        
        <input type="text" id="nome-aluno" placeholder="Seu Nome Completo" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ddd; text-align: center;" oninput="validarProgresso()">
        
        <div class="avatar-grid">
            <div class="avatar-option selected" onclick="selAvatar(this, '⚔️')">⚔️</div>
            <div class="avatar-option" onclick="selAvatar(this, '🏹')">🏹</div>
            <div class="avatar-option" onclick="selAvatar(this, '🧙')">🧙</div>
            <div class="avatar-option" onclick="selAvatar(this, '🤖')">🤖</div>
        </div>

        <div style="margin: 10px 0; font-size: 0.8rem; color: #666;">
            <label><input type="checkbox" id="narration-mode"> 🔊 Modo Narrador (Inclusão)</label>
        </div>

        <div id="lvls">
            <div class="lvl-btn" id="btn-0" onclick="selecionarNivel(0)"><span>🛡️ Nível 1</span> <span class="lock">🔓</span></div>
            <div class="lvl-btn" id="btn-1" onclick="selecionarNivel(1)"><span>⚔️ Nível 2</span> <span class="lock" id="l1">🔒</span></div>
            <div class="lvl-btn" id="btn-2" onclick="selecionarNivel(2)"><span>🐉 Nível 3</span> <span class="lock" id="l2">🔒</span></div>
            <div class="lvl-btn" id="btn-blitz" style="color:var(--accent)" onclick="selecionarNivel('blitz')"><span>⚡ MODO BLITZ</span> <span>🔓</span></div>
        </div>

        <button class="btn-main" onclick="tentarIniciar()">JOGAR</button>
        <button class="btn-main" style="background:var(--gold); color:var(--dark)" onclick="verRanking()">🏆 RANKING</button>
    </div>

    <div id="game-screen" class="card" style="display:none;">
        <div id="cert-box">
            <div style="border: 8px double var(--gold); padding: 15px; background: #fffcf0;">
                <h2>MESTRE DA TABUADA</h2>
                <div id="cert-avatar" style="font-size: 3rem;"></div>
                <h1 id="cert-nome-txt"></h1>
                <p>Nível 3 Concluído com Honra!</p>
            </div>
            <button class="btn-main" onclick="location.reload()">SAIR</button>
        </div>

        <div id="life-container" style="width:100%; background:#eee; height:12px; border-radius:10px; overflow:hidden; margin-bottom:10px;">
            <div id="life-bar" style="width:100%; height:100%; background:var(--success); transition:0.3s"></div>
        </div>
        <div style="display:flex; justify-content: space-between;">
            <span id="player-tag" style="font-size:1.5rem"></span>
            <h2 id="time-txt" style="color:var(--primary); margin:0">--</h2>
        </div>
        <div id="q-box" class="question">? x ?</div>
        <input type="number" id="ans" inputmode="numeric">
        <button class="btn-main" onclick="check()">ATACAR!</button>
    </div>

    <div class="section-container">
        <div class="blog-card">
            <h3 style="color:var(--accent); margin:0">Mural de Depoimentos</h3>
            <div id="testi-area" style="margin-top:15px"></div>
        </div>
    </div>

    <footer onclick="abrirAdmin()">© 2026 Hilário Schwanz | Painel Admin</footer>

    <div id="admin-panel">
        <input type="text" id="edit-text" placeholder="Título Banner" class="admin-input">
        <input type="text" id="edit-url" placeholder="URL Imagem Banner" class="admin-input">
        <button class="btn-main" onclick="salvarAdmin()">SALVAR BANNER</button>
        <button class="btn-main" style="background:#888" onclick="document.getElementById('admin-panel').style.display='none'">FECHAR</button>
    </div>

    <script>
        const synth = window.speechSynthesis;
        let avatarSel = "⚔️", narrar = false, curLvl = 0, currentSlide = 0;
        let ativo = false, vida = 100, acertos = 0, tentativas = 0, res, crono, tempo;

        // LÓGICA DE NÍVEIS ORIGINAL (CONFIGURAÇÃO)
        let conf = [
            { t: 10, d: 20 }, // Nível 1
            { t: 8, d: 30 },  // Nível 2
            { t: 5, d: 40 },  // Nível 3
            { t: 60, d: 0 }   // Blitz
        ];

        function falar(t) { if(narrar) { synth.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang='pt-BR'; synth.speak(m); } }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        function renderBanner() {
            const data = JSON.parse(localStorage.getItem('banner_data')) || { text: "Patrocine aqui", url: "" };
            document.getElementById('banner-area').innerHTML = `<div class="slide active"><img src="${data.url || 'https://via.placeholder.com/70'}"><div class="slide-info"><p class="slide-title">${data.text}</p></div></div>`;
        }

        function validarProgresso() {
            const nome = document.getElementById('nome-aluno').value.trim();
            const prog = parseInt(localStorage.getItem('prog_'+nome)) || 0;
            document.getElementById('l1').innerText = prog >= 1 ? "🔓" : "🔒";
            document.getElementById('l2').innerText = prog >= 2 ? "🔓" : "🔒";
        }

        function selecionarNivel(l) {
            const nome = document.getElementById('nome-aluno').value.trim();
            if(!nome) return alert("Nome?");
            const prog = parseInt(localStorage.getItem('prog_'+nome)) || 0;
            if(l !== 'blitz' && l > prog) return alert("Nível Bloqueado!");
            curLvl = l;
            document.querySelectorAll('.lvl-btn').forEach(b => b.style.background = "white");
            document.getElementById(l === 'blitz' ? 'btn-blitz' : 'btn-'+l).style.background = "#eee";
        }

        function tentarIniciar() {
            if(document.getElementById('nome-aluno').value.length < 3) return;
            narrar = document.getElementById('narration-mode').checked;
            document.getElementById('setup-screen').style.display='none';
            document.getElementById('game-screen').style.display='block';
            document.getElementById('player-tag').innerText = avatarSel;
            vida=100; acertos=0; tentativas=0; ativo=true;
            if(curLvl === 'blitz') {
                tempo = 60; crono = setInterval(() => { tempo--; document.getElementById('time-txt').innerText = tempo+"s"; if(tempo <= 0) finalizar(); }, 1000);
            }
            rodar();
        }

        function rodar() {
            if(!ativo) return;
            let r1 = Math.floor(Math.random()*8)+2, r2 = Math.floor(Math.random()*8)+2;
            res = r1 * r2;
            document.getElementById('q-box').innerText = r1 + " × " + r2;
            document.getElementById('ans').value = ""; document.getElementById('ans').focus();
            falar(`${r1} vezes ${r2}`);
            if(curLvl !== 'blitz') {
                clearInterval(crono); tempo = conf[curLvl].t;
                document.getElementById('time-txt').innerText = tempo+"s";
                crono = setInterval(() => {
                    tempo--; document.getElementById('time-txt').innerText = tempo+"s";
                    if(tempo <= 0) { vida -= conf[curLvl].d; atualizarVida(); if(vida <= 0) finalizar(); else rodar(); }
                }, 1000);
            }
        }

        function check() {
            let v = parseInt(document.getElementById('ans').value); if(isNaN(v)) return;
            tentativas++;
            if(v === res) { acertos++; falar("Certo"); }
            else { if(curLvl !== 'blitz') vida -= conf[curLvl].d; falar("Errou"); }
            atualizarVida();
            if(vida <= 0 || (curLvl !== 'blitz' && tentativas >= 20)) finalizar(); else rodar();
        }

        function atualizarVida() { document.getElementById('life-bar').style.width = Math.max(0, vida) + "%"; }

        function finalizar() {
            ativo = false; clearInterval(crono);
            const nome = document.getElementById('nome-aluno').value.trim();
            const efic = Math.round((acertos/tentativas)*100) || 0;
            const lvlTag = curLvl === 'blitz' ? "Blitz" : "Nível " + (curLvl + 1);

            salvarRanking(nome, avatarSel, efic, lvlTag);

            if(vida > 0 && curLvl !== 'blitz') {
                const prog = parseInt(localStorage.getItem('prog_'+nome)) || 0;
                if(curLvl >= prog) localStorage.setItem('prog_'+nome, curLvl + 1);
                if(curLvl === 2 && efic >= 75) {
                    confetti();
                    document.getElementById('cert-avatar').innerText = avatarSel;
                    document.getElementById('cert-nome-txt').innerText = nome.toUpperCase();
                    document.getElementById('cert-box').style.display = 'block';
                    return;
                }
            }
            alert(`Fim! Precisão de ${efic}% no ${lvlTag}`);
            location.reload();
        }

        function salvarRanking(n, av, ef, lv) {
            let r = JSON.parse(localStorage.getItem('rank_final')) || [];
            r.push({nome: n, avatar: av, efic: ef, lvl: lv});
            r.sort((a,b) => b.efic - a.efic); // Ordena apenas por %
            localStorage.setItem('rank_final', JSON.stringify(r.slice(0, 10)));
        }

        function verRanking() {
            const r = JSON.parse(localStorage.getItem('rank_final')) || [];
            document.getElementById('ranking-list').innerHTML = r.map(i => `
                <div class="rank-item">
                    <span>${i.avatar} ${i.nome}</span>
                    <span>${i.efic}% (${i.lvl})</span>
                </div>
            `).join('') || "Sem recordes";
            document.getElementById('ranking-box').style.display='block';
        }

        function selAvatar(el, icon) { document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected')); el.classList.add('selected'); avatarSel = icon; }
        function abrirAdmin() { if(prompt("Senha:") === "Food2024@") document.getElementById('admin-panel').style.display='block'; }
        function salvarAdmin() { localStorage.setItem('banner_data', JSON.stringify({text: document.getElementById('edit-text').value, url: document.getElementById('edit-url').value})); location.reload(); }

        window.onload = () => { renderBanner(); };
        document.addEventListener("keydown", (e) => { if(e.key === "Enter" && ativo) check(); });
    </script>
</body>
</html>
