<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha da Tabuada - Prof. Hilário</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #0f3460; --accent: #e94560; --gold: #f1c40f; --success: #27ae60; 
            --dark: #1a1a2e; --card-bg: #ffffff; --text: #1a1a2e; --bg: #1a1a2e; --footer-text: #ffffff;
        }
        body.light-mode { --bg: #f0f2f5; --card-bg: #ffffff; --text: #1a1a2e; --footer-text: #1a1a2e; }
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }

        .theme-toggle { position: fixed; top: 15px; right: 15px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; z-index: 1000; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        /* JOGO */
        .card { background: var(--card-bg); color: var(--text); padding: 25px; border-radius: 30px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; width: 100%; max-width: 500px; }
        .avatar-grid { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .avatar-option { font-size: 2rem; cursor: pointer; padding: 10px; border-radius: 15px; border: 2px solid #eee; background: #f9f9f9; }
        .avatar-option.selected { border-color: var(--accent); background: #fff0f1; transform: scale(1.1); }
        
        .question { font-size: clamp(3rem, 10vh, 5rem); font-weight: 900; color: var(--primary); margin: 15px 0; }
        #ans { width: 100%; max-width: 180px; font-size: 2.5rem; text-align: center; border-radius: 15px; border: 3px solid #eee; padding: 10px; outline: none; background: #fdfdfd; color: var(--dark); }
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        
        .lvl-btn { padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 8px; cursor: pointer; color: #333; font-weight: 700; background: white; display: flex; justify-content: space-between; align-items: center; }
        
        #ranking-box, #cert-box { display: none; position: absolute; inset: 0; background: white; z-index: 100; border-radius: 30px; padding: 20px; overflow-y: auto; color: #333; }
        .rank-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.9rem; }

        footer { margin-top: 40px; text-align: center; font-size: 0.8rem; opacity: 0.7; color: var(--footer-text); padding-bottom: 30px; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>

    <div id="setup-screen" class="card">
        <div id="ranking-box">
            <h2 style="color:var(--primary)">🏆 RANKING GERAL</h2>
            <div id="ranking-list"></div>
            <button class="btn-main" onclick="document.getElementById('ranking-box').style.display='none'" style="background:#888">VOLTAR</button>
        </div>

        <strong style="color:var(--accent)">👨‍🏫 Professor</strong>
        <h2 style="margin: 5px 0;">⚔️ BATALHA DA TABUADA</h2>
        
        <input type="text" id="nome-aluno" placeholder="Seu Nome Completo" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ddd; text-align: center; margin-bottom: 10px;" oninput="validarProgresso()">
        
        <div class="avatar-grid">
            <div class="avatar-option selected" onclick="selAvatar(this, '⚔️')">⚔️</div>
            <div class="avatar-option" onclick="selAvatar(this, '🏹')">🏹</div>
            <div class="avatar-option" onclick="selAvatar(this, '🧙')">🧙</div>
            <div class="avatar-option" onclick="selAvatar(this, '🤖')">🤖</div>
        </div>

        <div style="margin: 10px 0; font-size: 0.85rem; color: #666;">
            <label><input type="checkbox" id="narration-mode"> 🔊 Modo Narrador (Acessibilidade)</label>
        </div>

        <div id="lvls">
            <div class="lvl-btn" id="btn-0" onclick="selecionarNivel(0)"><span>🛡️ Nível 1</span> <span class="lock">🔓</span></div>
            <div class="lvl-btn" id="btn-1" onclick="selecionarNivel(1)"><span>⚔️ Nível 2</span> <span class="lock" id="l1">🔒</span></div>
            <div class="lvl-btn" id="btn-2" onclick="selecionarNivel(2)"><span>🐉 Nível 3</span> <span class="lock" id="l2">🔒</span></div>
            <div class="lvl-btn" id="btn-blitz" style="border-color:var(--accent); color:var(--accent)" onclick="selecionarNivel('blitz')"><span>⚡ MODO BLITZ</span> <span>🔓</span></div>
        </div>

        <button class="btn-main" onclick="tentarIniciar()">INICIAR BATALHA</button>
        <button class="btn-main" style="background:var(--gold); color:var(--dark)" onclick="verRanking()">🏆 VER RANKING</button>
    </div>

    <div id="game-screen" class="card" style="display:none;">
        <div id="cert-box">
            <div style="border: 8px double var(--gold); padding: 15px; background: #fffcf0;">
                <h2 style="margin:0">MESTRE DA TABUADA</h2>
                <div id="cert-avatar" style="font-size: 3rem; margin:10px 0"></div>
                <h1 id="cert-nome-txt" style="font-size:1.5rem; margin:10px 0"></h1>
                <p>Você provou sua honra no campo da Matemática!</p>
            </div>
            <button class="btn-main" onclick="location.reload()">SAIR</button>
        </div>

        <div id="shield-status" style="position: absolute; top: 10px; left: 10px; font-size: 1.5rem; display: none;">🛡️</div>
        
        <div id="life-container" style="width:100%; background:#eee; height:12px; border-radius:10px; overflow:hidden; margin-bottom:10px;">
            <div id="life-bar" style="width:100%; height:100%; background:var(--success); transition:0.3s"></div>
        </div>
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span id="player-tag" style="font-size:1.5rem"></span>
            <h2 id="time-txt" style="color:var(--primary); margin:0">--</h2>
        </div>
        <div id="q-box" class="question">? x ?</div>
        <input type="number" id="ans" inputmode="numeric">
        <button class="btn-main" onclick="check()">ATACAR!</button>
    </div>

    <footer>© 2026 Hilário Schwanz</footer>

    <script>
        const synth = window.speechSynthesis;
        let avatarSel = "⚔️", narrar = false, combo = 0, shield = false;
        let nvlConfig = [
            { min: 2, max: 5, tempo: 10, dano: 20, nome: "Nível 1" },
            { min: 2, max: 9, tempo: 8, dano: 25, nome: "Nível 2" },
            { min: 6, max: 12, tempo: 6, dano: 34, nome: "Nível 3" },
            { min: 2, max: 10, tempo: 60, dano: 0, nome: "Blitz" }
        ];
        let curLvl = 0, ativo = false, vida = 100, acertos = 0, tentativas = 0, res, crono, tempoRestante;

        function falar(t) { if(narrar) { synth.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang='pt-BR'; synth.speak(m); } }
        function toggleTheme() { const isL = document.body.classList.toggle('light-mode'); localStorage.setItem('theme', isL?'light':'dark'); }

        function validarProgresso() {
            const nome = document.getElementById('nome-aluno').value.trim();
            const prog = parseInt(localStorage.getItem('prog_'+nome)) || 0;
            document.getElementById('l1').innerText = prog >= 1 ? "🔓" : "🔒";
            document.getElementById('l2').innerText = prog >= 2 ? "🔓" : "🔒";
        }

        function selecionarNivel(l) {
            const nome = document.getElementById('nome-aluno').value.trim();
            if(!nome) return alert("Digite seu nome!");
            const prog = parseInt(localStorage.getItem('prog_'+nome)) || 0;
            if(l !== 'blitz' && l > prog) return alert("Vença o nível anterior!");
            curLvl = l;
            document.querySelectorAll('.lvl-btn').forEach(b => b.style.background = "white");
            document.getElementById(l === 'blitz' ? 'btn-blitz' : 'btn-'+l).style.background = "#eee";
        }

        function tentarIniciar() {
            if(document.getElementById('nome-aluno').value.length < 3) return;
            narrar = document.getElementById('narration-mode').checked;
            document.getElementById('setup-screen').style.display='none';
            document.getElementById('game-screen').style.display='block';
            document.getElementById('player-tag').innerText = avatarSel;
            vida=100; acertos=0; tentativas=0; ativo=true;
            if(curLvl === 'blitz') {
                tempoRestante = 60;
                crono = setInterval(() => { tempoRestante--; document.getElementById('time-txt').innerText = tempoRestante+"s"; if(tempoRestante <= 0) finalizar(); }, 1000);
            }
            rodarQuestao();
        }

        function rodarQuestao() {
            if(!ativo) return;
            const config = curLvl === 'blitz' ? nvlConfig[3] : nvlConfig[curLvl];
            let r1 = Math.floor(Math.random()*(config.max - config.min + 1)) + config.min;
            let r2 = Math.floor(Math.random()*8) + 2;
            res = r1 * r2;
            document.getElementById('q-box').innerText = `${r1} × ${r2}`;
            document.getElementById('ans').value = ""; document.getElementById('ans').focus();
            falar(`Quanto é ${r1} vezes ${r2}?`);
            if(curLvl !== 'blitz') iniciarTimer(config.tempo);
        }

        function iniciarTimer(t) {
            clearInterval(crono); tempoRestante = t;
            document.getElementById('time-txt').innerText = tempoRestante+"s";
            crono = setInterval(() => {
                tempoRestante--; document.getElementById('time-txt').innerText = tempoRestante+"s";
                if(tempoRestante <= 0) { vida -= nvlConfig[curLvl].d; atualizarVida(); if(vida <= 0) finalizar(); else rodarQuestao(); }
            }, 1000);
        }

        function check() {
            const v = parseInt(document.getElementById('ans').value); if(isNaN(v)) return;
            tentativas++;
            if(v === res) { acertos++; falar("Correto!"); }
            else { if(curLvl !== 'blitz') vida -= nvlConfig[curLvl].d; falar("Humm, errou."); }
            atualizarVida();
            if(vida <= 0 || (curLvl !== 'blitz' && tentativas >= 20)) finalizar(); else rodarQuestao();
        }

        function atualizarVida() { document.getElementById('life-bar').style.width = Math.max(0, vida) + "%"; }

        function finalizar() {
            ativo = false; clearInterval(crono);
            const nomeAlu = document.getElementById('nome-aluno').value.trim();
            const efic = Math.round((acertos / tentativas) * 100) || 0;
            const lvlTxt = curLvl === 'blitz' ? "Blitz" : "Nível " + (curLvl + 1);

            salvarNoRanking(nomeAlu, avatarSel, efic, lvlTxt);

            if(vida > 0 && curLvl !== 'blitz') {
                const prog = parseInt(localStorage.getItem('prog_'+nomeAlu)) || 0;
                if(curLvl >= prog) localStorage.setItem('prog_'+nomeAlu, curLvl + 1);
                if(curLvl === 2 && efic >= 75) {
                    confetti();
                    document.getElementById('cert-avatar').innerText = avatarSel;
                    document.getElementById('cert-nome-txt').innerText = nomeAlu.toUpperCase();
                    document.getElementById('cert-box').style.display = 'block';
                    return;
                }
            }
            alert(`Fim de jogo! ${efic}% de acerto no ${lvlTxt}`);
            location.reload();
        }

        function salvarNoRanking(n, av, ef, lv) {
            let rank = JSON.parse(localStorage.getItem('rank_tabuada')) || [];
            rank.push({ nome: n, avatar: av, efic: ef, lvl: lv });
            // Ordena por Nível (Nível 3 > Nível 2 > Nível 1) e depois por %
            rank.sort((a, b) => b.lvl.localeCompare(a.lvl) || b.efic - a.efic);
            localStorage.setItem('rank_tabuada', JSON.stringify(rank.slice(0, 10)));
        }

        function verRanking() {
            const rank = JSON.parse(localStorage.getItem('rank_tabuada')) || [];
            document.getElementById('ranking-list').innerHTML = rank.map(item => `
                <div class="rank-item">
                    <span>${item.avatar} <b>${item.nome}</b></span>
                    <span>${item.efic}% (${item.lvl})</span>
                </div>
            `).join('') || "Sem recordes ainda!";
            document.getElementById('ranking-box').style.display='block';
        }

        window.onload = () => { if(localStorage.getItem('theme') === 'light') toggleTheme(); };
        document.addEventListener("keydown", (e) => { if(e.key === "Enter" && ativo) check(); });
    </script>
</body>
</html>
