<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha da Tabuada - Hilário Schwanz</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #0f3460; --accent: #e94560; --gold: #f1c40f; --success: #27ae60; --dark: #1a1a2e; }
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 20px 10px;
        }
        
        .arena-layout { display: flex; gap: 20px; width: 100%; max-width: 1200px; justify-content: center; align-items: flex-start; }
        .card { 
            background: #fff; color: var(--dark); padding: 30px; border-radius: 30px; 
            text-align: center; flex: 2; box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            min-width: 320px; position: relative;
        }
        
        .question { font-size: clamp(3rem, 10vh, 5rem); font-weight: 900; color: var(--primary); margin: 20px 0; }
        #ans { width: 100%; max-width: 200px; font-size: 2.5rem; text-align: center; border-radius: 15px; border: 3px solid #eee; padding: 10px; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        
        .lvl-btn { padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 8px; cursor: pointer; color: #333; transition: 0.2s; }
        
        #ranking-box, #cert-box { 
            display: none; position: absolute; inset: 0; background: white; 
            z-index: 100; border-radius: 30px; padding: 20px; overflow-y: auto; color: #333;
        }

        .rank-item { text-align: left; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.8rem; }
        .certificate { border: 8px double var(--gold); padding: 15px; background: #fffcf0; height: 80%; display: flex; flex-direction: column; justify-content: center; }

        @media (max-width: 800px) { .arena-layout { flex-direction: column; align-items: center; } .card { width: 100%; } }
    </style>
</head>
<body>

    <div class="arena-layout">
        <div id="setup-screen" class="card">
            <div id="ranking-box">
                <h2 id="rank-title">🏆 RANKING</h2>
                <div id="ranking-list"></div>
                <button class="btn-main" onclick="fecharJanelas()" style="background:#888">FECHAR</button>
            </div>

            <strong style="color:var(--accent)">👨‍🏫 Hilário Schwanz</strong>
            <h1 style="font-size: 1.4rem;">⚔️ BATALHA DA TABUADA</h1>
            
            <input type="text" id="nome-aluno" placeholder="Seu Nome" style="width:100%; padding:12px; border-radius:10px; border:2px solid #ddd; margin: 10px 0;" oninput="validarNome()">
            
            <div id="lvls">
                <div class="lvl-btn" id="btn-0" onclick="selecionarNivel(0)">🛡️ Nível 1</div>
                <div class="lvl-btn" id="btn-1" onclick="selecionarNivel(1)">⚔️ Nível 2 <span id="l1">🔒</span></div>
                <div class="lvl-btn" id="btn-2" onclick="selecionarNivel(2)">🐉 Nível 3 <span id="l2">🔒</span></div>
                <div class="lvl-btn" id="btn-blitz" style="border-color:var(--accent); color:var(--accent)" onclick="selecionarNivel('blitz')">⚡ MODO BLITZ</div>
            </div>

            <button class="btn-main" onclick="tentarIniciar()">JOGAR</button>
            <button class="btn-main" style="background:var(--gold); color:var(--dark)" onclick="verRanking()">🏆 RANKING</button>
        </div>

        <div id="game-screen" class="card" style="display:none;">
            <div id="cert-box">
                <div class="certificate">
                    <h2 style="margin:0">MESTRE DA TABUADA</h2>
                    <p>Certificamos que:</p>
                    <h1 id="cert-nome-txt" style="color:var(--accent); margin:10px 0;"></h1>
                    <p>Eficiência: <span id="cert-efic"></span>%</p>
                    <div style="font-size:3rem">🥇</div>
                </div>
                <button class="btn-main" onclick="location.reload()">SAIR</button>
            </div>

            <div id="game-over" style="display:none; position:absolute; inset:0; background:white; z-index:10; flex-direction:column; justify-content:center; align-items:center; border-radius:30px; padding:20px;">
                <h1 id="go-title"></h1>
                <p id="go-stats" style="font-weight:bold; color:#333"></p>
                <button class="btn-main" onclick="location.reload()">VOLTAR</button>
            </div>
            
            <div id="life-container" style="width:100%; background:#eee; height:12px; border-radius:10px; overflow:hidden; margin-bottom:10px;">
                <div id="life-bar" style="width:100%; height:100%; background:var(--success); transition:0.3s"></div>
            </div>
            <h2 id="time-txt" style="color:var(--primary); margin:0">--</h2>
            <div id="q-box" class="question">? x ?</div>
            <input type="number" id="ans" inputmode="numeric">
            <button class="btn-main" onclick="check()">ATACAR</button>
        </div>
    </div>

    <script>
        let conf = [{t:10, d:20}, {t:8, d:30}, {t:5, d:40}];
        let curLvl = 0, nome = "", vida = 100, tentativas = 0, acertos = 0, erros = 0, ativo = false, res, crono, tempo, inicioGame;

        function validarNome() {
            nome = document.getElementById('nome-aluno').value;
            let p = parseInt(localStorage.getItem('prog_'+nome)) || 0;
            document.getElementById('l1').innerText = p >= 1 ? "🔓" : "🔒";
            document.getElementById('l2').innerText = p >= 2 ? "🔓" : "🔒";
        }

        function selecionarNivel(l) {
            let p = parseInt(localStorage.getItem('prog_'+nome)) || 0;
            if(l === 'blitz' || l <= p) {
                curLvl = l;
                document.querySelectorAll('.lvl-btn').forEach(b => { 
                    b.style.background = "white"; b.style.color = (b.id === 'btn-blitz') ? "#e94560" : "black"; 
                });
                let sel = (l === 'blitz') ? document.getElementById('btn-blitz') : document.getElementById('btn-'+l);
                sel.style.background = "#0f3460"; sel.style.color = "white";
            }
        }

        function tentarIniciar() {
            if(nome.length < 2) return alert("Digite seu nome!");
            document.getElementById('setup-screen').style.display='none';
            document.getElementById('game-screen').style.display='block';
            vida=100; tentativas=0; acertos=0; erros=0; ativo=true; inicioGame = Date.now();
            if(curLvl === 'blitz') {
                document.getElementById('life-container').style.display = 'none';
                tempo = 60;
                crono = setInterval(() => {
                    tempo--; document.getElementById('time-txt').innerText = tempo+"s";
                    if(tempo <= 0) fim();
                }, 1000);
            }
            rodada();
        }

        function rodada() {
            if(!ativo) return;
            let r1 = Math.floor(Math.random()*8)+2; 
            let r2 = Math.floor(Math.random()*8)+2; 
            res = r1 * r2;
            document.getElementById('q-box').innerText = r1 + " × " + r2;
            document.getElementById('ans').value = ""; document.getElementById('ans').focus();
            if(curLvl !== 'blitz') startTimer();
        }

        function startTimer() {
            clearInterval(crono);
            tempo = conf[curLvl].t;
            document.getElementById('time-txt').innerText = tempo+"s";
            crono = setInterval(() => {
                tempo--;
                document.getElementById('time-txt').innerText = tempo+"s";
                if(tempo <= 0) {
                    tentativas++; erros++;
                    vida -= conf[curLvl].d;
                    updateLife();
                    if(vida <= 0 || tentativas >= 20) fim(); else rodada();
                }
            }, 1000);
        }

        function check() {
            let v = parseInt(document.getElementById('ans').value);
            if(isNaN(v)) return;
            tentativas++;
            if(v === res) {
                acertos++;
                if(curLvl !== 'blitz') vida = Math.min(100, vida+5);
            } else {
                erros++;
                if(curLvl !== 'blitz') vida -= conf[curLvl].d;
                else tempo = Math.max(0, tempo-2);
            }
            if(curLvl !== 'blitz') {
                updateLife();
                if(vida <= 0 || tentativas >= 20) fim(); else rodada();
            } else {
                rodada();
            }
        }

        function updateLife() { document.getElementById('life-bar').style.width = Math.max(0, vida) + "%"; }

        function fim() {
            ativo = false; clearInterval(crono);
            let tFinal = ((Date.now() - inicioGame) / 1000).toFixed(1);
            let efic = ((acertos / tentativas) * 100 || 0).toFixed(1);
            
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('go-title').innerText = (vida > 0 || curLvl === 'blitz') ? "FIM DE JOGO!" : "DERROTA!";
            document.getElementById('go-stats').innerHTML = `Eficiência: ${efic}%<br>Acertos: ${acertos} | Erros: ${erros}<br>Tempo: ${tFinal}s`;

            if(curLvl === 2 || curLvl === 'blitz') {
                salvarRanking(nome, efic, acertos, erros, tFinal);
                if(efic >= 70 && curLvl === 2) {
                    confetti();
                    setTimeout(() => {
                        document.getElementById('cert-nome-txt').innerText = nome.toUpperCase();
                        document.getElementById('cert-efic').innerText = efic;
                        document.getElementById('cert-box').style.display = 'block';
                    }, 1500);
                }
            }
            if(vida > 0 && curLvl < 2 && curLvl !== 'blitz') localStorage.setItem('prog_'+nome, curLvl+1);
        }

        function salvarRanking(n, ef, ac, er, tm) {
            let r = JSON.parse(localStorage.getItem('rank_global')) || [];
            r.push({nome: n, efic: ef, acertos: ac, erros: er, tempo: tm});
            r.sort((a,b) => b.efic - a.efic || a.tempo - b.tempo);
            localStorage.setItem('rank_global', JSON.stringify(r.slice(0, 10)));
        }

        function verRanking() {
            let r = JSON.parse(localStorage.getItem('rank_global')) || [];
            document.getElementById('ranking-list').innerHTML = r.map((x, i) => `
                <div class="rank-item">${i+1}º <b>${x.nome}</b> - ${x.efic}% (✅${x.acertos} ❌${x.erros}) em ${x.tempo}s</div>
            `).join('') || "Sem recordes.";
            document.getElementById('ranking-box').style.display = 'block';
        }

        function fecharJanelas() { document.getElementById('ranking-box').style.display = 'none'; }
        document.addEventListener("keydown", (e) => { if(e.key === "Enter" && ativo) check(); });
    </script>
</body>
</html>
