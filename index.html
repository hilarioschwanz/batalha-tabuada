<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha da Tabuada - Prof. Hilário</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #0f3460; --accent: #e94560; --gold: #f1c40f; --success: #27ae60; 
            --dark: #1a1a2e; --card-bg: #ffffff; --text: #1a1a2e; --bg: #1a1a2e; --footer-text: #ffffff;
        }
        body.light-mode { --bg: #f0f2f5; --card-bg: #ffffff; --text: #1a1a2e; --footer-text: #1a1a2e; }
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }

        /* BANNERS CLICÁVEIS */
        .banner-wrapper { width: 100%; max-width: 800px; margin-bottom: 20px; background: #16213e; border-radius: 20px; border: 2px solid #444; overflow: hidden; position: relative; height: 100px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .slide { position: absolute; inset: 0; display: flex; align-items: center; padding: 10px 15px; opacity: 0; transition: opacity 0.8s; visibility: hidden; }
        .slide.active { opacity: 1; visibility: visible; z-index: 5; }
        .slide img { height: 70px; width: 70px; object-fit: cover; border-radius: 12px; margin-right: 15px; border: 2px solid var(--gold); }
        .slide-info { text-align: left; }
        .slide-title { color: var(--gold); font-weight: 800; margin: 0; font-size: 1rem; text-transform: uppercase; }
        .slide-text { color: #eee; font-size: 0.75rem; margin: 2px 0; line-height: 1.2; }

        .card { background: var(--card-bg); color: var(--text); padding: 25px; border-radius: 30px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; width: 100%; max-width: 500px; }
        .question { font-size: clamp(3rem, 10vh, 5rem); font-weight: 900; color: var(--primary); margin: 15px 0; }
        #ans { width: 100%; max-width: 180px; font-size: 2.5rem; text-align: center; border-radius: 15px; border: 3px solid #eee; padding: 10px; color: var(--dark); }
        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        .lvl-btn { padding: 12px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 8px; cursor: pointer; color: #333; font-weight: 700; background: white; display: flex; justify-content: space-between; }
        
        #ranking-box, #cert-box { display: none; position: absolute; inset: 0; background: white; z-index: 100; border-radius: 30px; padding: 20px; overflow-y: auto; color: #333; }
        .rank-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }

        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 20px; z-index: 2000; width: 95%; max-width: 450px; box-shadow: 0 0 100px rgba(0,0,0,0.8); }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
        footer { margin-top: 40px; text-align: center; font-size: 0.8rem; opacity: 0.7; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="banner-wrapper" id="banner-area">
        </div>

    <div id="setup-screen" class="card">
        <div id="ranking-box">
            <h2 style="color:var(--primary)">🏆 RANKING</h2>
            <div id="ranking-list"></div>
            <button class="btn-main" onclick="document.getElementById('ranking-box').style.display='none'" style="background:#888">VOLTAR</button>
        </div>

        <strong style="color:var(--accent)">👨‍🏫 Professor Hilário</strong>
        <h2>⚔️ BATALHA DA TABUADA</h2>
        
        <input type="text" id="nome-aluno" placeholder="Nome Completo" style="width:100%; padding:12px; border-radius:12px; border:2px solid #ddd; text-align: center;" oninput="validarProgresso()">
        
        <div id="lvls" style="margin-top:15px">
            <div class="lvl-btn" id="btn-0" onclick="selecionarNivel(0)"><span>🛡️ Nível 1</span> <span class="lock">🔓</span></div>
            <div class="lvl-btn" id="btn-1" onclick="selecionarNivel(1)"><span>⚔️ Nível 2</span> <span class="lock" id="l1">🔒</span></div>
            <div class="lvl-btn" id="btn-2" onclick="selecionarNivel(2)"><span>🐉 Nível 3</span> <span class="lock" id="l2">🔒</span></div>
        </div>

        <button class="btn-main" onclick="tentarIniciar()">JOGAR</button>
        <button class="btn-main" style="background:var(--gold); color:var(--dark)" onclick="verRanking()">🏆 RANKING</button>
    </div>

    <div id="game-screen" class="card" style="display:none;">
        <div id="life-bar" style="width:100%; height:12px; background:var(--success); border-radius:10px; margin-bottom:10px;"></div>
        <h2 id="time-txt">--</h2>
        <div id="q-box" class="question">? x ?</div>
        <input type="number" id="ans" inputmode="numeric">
        <button class="btn-main" onclick="check()">ATACAR!</button>
    </div>

    <footer onclick="abrirAdmin()">© 2026 Hilário Schwanz | Painel Admin</footer>

    <div id="admin-panel">
        <h3>Configurar Banners</h3>
        <select id="ad-slot" class="admin-input" onchange="carregarDadosAdmin()">
            <option value="1">Slot 1 (Zelayce)</option>
            <option value="2">Slot 2 (Beer Food Truck)</option>
            <option value="3">Slot 3 (Stop Lanche)</option>
        </select>
        <input type="text" id="edit-title" placeholder="Título" class="admin-input">
        <input type="text" id="edit-desc" placeholder="Descrição curta" class="admin-input">
        <input type="text" id="edit-url" placeholder="URL da Imagem" class="admin-input">
        <input type="text" id="edit-link" placeholder="Link (Instagram/WhatsApp)" class="admin-input">
        <button class="btn-main" onclick="salvarAdmin()">SALVAR SLOT</button>
        <button class="btn-main" style="background:#888" onclick="document.getElementById('admin-panel').style.display='none'">FECHAR</button>
    </div>

    <script>
        let curLvl = 0, ativo = false, vida = 100, acertos = 0, tentativas = 0, res, crono, tempo;
        let slideIndex = 0;

        // INICIALIZAÇÃO DOS BANNERS
        function carregarBanners() {
            const container = document.getElementById('banner-area');
            let html = '';
            for(let i=1; i<=3; i++) {
                const data = JSON.parse(localStorage.getItem('ad_slot_'+i)) || { title: "Anuncie Aqui", desc: "Espaço disponível", url: "", link: "#" };
                html += `
                    <div class="slide ${i===1?'active':''}" onclick="window.open('${data.link}', '_blank')">
                        <img src="${data.url || 'https://via.placeholder.com/70'}">
                        <div class="slide-info">
                            <p class="slide-title">${data.title}</p>
                            <p class="slide-text">${data.desc}</p>
                        </div>
                    </div>`;
            }
            container.innerHTML = html;
            iniciarRotacao();
        }

        function iniciarRotacao() {
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                slides[slideIndex].classList.remove('active');
                slideIndex = (slideIndex + 1) % slides.length;
                slides[slideIndex].classList.add('active');
            }, 5000);
        }

        // ADMIN
        function abrirAdmin() { if(prompt("Senha:") === "Food2024@") { document.getElementById('admin-panel').style.display='block'; carregarDadosAdmin(); } }
        function carregarDadosAdmin() {
            const slot = document.getElementById('ad-slot').value;
            const data = JSON.parse(localStorage.getItem('ad_slot_'+slot)) || { title: "", desc: "", url: "", link: "" };
            document.getElementById('edit-title').value = data.title;
            document.getElementById('edit-desc').value = data.desc;
            document.getElementById('edit-url').value = data.url;
            document.getElementById('edit-link').value = data.link;
        }
        function salvarAdmin() {
            const slot = document.getElementById('ad-slot').value;
            const obj = {
                title: document.getElementById('edit-title').value,
                desc: document.getElementById('edit-desc').value,
                url: document.getElementById('edit-url').value,
                link: document.getElementById('edit-link').value
            };
            localStorage.setItem('ad_slot_'+slot, JSON.stringify(obj));
            alert("Salvo com sucesso!");
            location.reload();
        }

        // JOGO (RESTAURADO)
        function validarProgresso() {
            const n = document.getElementById('nome-aluno').value.trim();
            const p = parseInt(localStorage.getItem('prog_'+n)) || 0;
            document.getElementById('l1').innerText = p >= 1 ? "🔓" : "🔒";
            document.getElementById('l2').innerText = p >= 2 ? "🔓" : "🔒";
        }

        function selecionarNivel(l) {
            const n = document.getElementById('nome-aluno').value.trim();
            if(!n) return;
            const p = parseInt(localStorage.getItem('prog_'+n)) || 0;
            if(l > p) return alert("Nível Bloqueado!");
            curLvl = l;
            document.querySelectorAll('.lvl-btn').forEach(b => b.style.background = "white");
            document.getElementById('btn-'+l).style.background = "#eee";
        }

        function tentarIniciar() {
            if(document.getElementById('nome-aluno').value.length < 3) return;
            document.getElementById('setup-screen').style.display='none';
            document.getElementById('game-screen').style.display='block';
            rodar();
        }

        function rodar() {
            let r1 = Math.floor(Math.random()*8)+2, r2 = Math.floor(Math.random()*8)+2;
            res = r1 * r2;
            document.getElementById('q-box').innerText = r1 + " × " + r2;
            document.getElementById('ans').value = ""; document.getElementById('ans').focus();
        }

        function check() {
            let v = parseInt(document.getElementById('ans').value);
            tentativas++;
            if(v === res) acertos++;
            if(tentativas >= 20) finalizar(); else rodar();
        }

        function finalizar() {
            const n = document.getElementById('nome-aluno').value.trim();
            const ef = Math.round((acertos/tentativas)*100);
            const r = JSON.parse(localStorage.getItem('rank_tab')) || [];
            r.push({nome: n, efic: ef, lvl: (curLvl+1)});
            r.sort((a,b) => b.efic - a.efic);
            localStorage.setItem('rank_tab', JSON.stringify(r.slice(0,10)));
            
            if(ef >= 70) {
                const p = parseInt(localStorage.getItem('prog_'+n)) || 0;
                if(curLvl >= p) localStorage.setItem('prog_'+n, curLvl+1);
            }
            alert("Fim! Precisão: " + ef + "%");
            location.reload();
        }

        function verRanking() {
            const r = JSON.parse(localStorage.getItem('rank_tab')) || [];
            document.getElementById('ranking-list').innerHTML = r.map(i => `<div class="rank-item"><span>${i.nome}</span><span>${i.efic}% (Nível ${i.lvl})</span></div>`).join('');
            document.getElementById('ranking-box').style.display='block';
        }

        window.onload = carregarBanners;
    </script>
</body>
</html>
